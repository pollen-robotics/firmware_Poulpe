defmt = "0.3"
defmt-rtt = "0.4"


cortex-m = { version = "=0.7.7", features = ["inline-asm", "critical-section-single-core"] }
cortex-m-rt = "=0.7.3"
embedded-hal = "=0.2.7"
embedded-hal-1 = { package = "embedded-hal", version = "=1.0.0-rc.1" }
embedded-hal-async = { version = "=1.0.0-rc.1" }
embedded-nal-async = { version = "=0.5.0" }

libm = "0.2.8"


panic-probe = { version = "0.3", features = ["print-defmt"] }
futures = { version = "=0.3.28", default-features = false, features = ["async-await"] }
# heapless = { version = "=0.7.15", default-features = false }
rand_core = "0.6.3"
critical-section = "=1.2.0"
micromath = "2.0.0"
stm32-fmc = "=0.2.4"
embedded-storage = "=0.3.0"
static_cell = { version = "=1.1", features = ["nightly"]}
paste = "1.0.14"
modular-bitfield = "0.11.2"
biquad = "0.4.1"



[dev-dependencies]
defmt = "0.3"
defmt-rtt = "0.4"
defmt-test = "0.3.1"

[dev-dependencies.panic-probe]
version = "0.3"
features = ["print-defmt"]


# cargo build/run
[profile.dev]
codegen-units = 1
debug = 2
debug-assertions = true # <-
incremental = false
opt-level = 3 # <-
overflow-checks = true # <-

# cargo test
[profile.test]
codegen-units = 1
debug = 2
debug-assertions = false # <-
incremental = false
opt-level = 3 # <-
overflow-checks = true # <-

# cargo build/run --release
[profile.release]
codegen-units = 1
debug = 2
debug-assertions = false # <-
incremental = false
lto = 'fat'
opt-level = 3 # <-
overflow-checks = false # <-

# cargo test --release
[profile.bench]
codegen-units = 1
debug = 2
debug-assertions = false # <-
incremental = false
lto = 'fat'
opt-level = 3 # <-
overflow-checks = false # <-



[[bin]]
name = "firmware_poulpe" # src/main.rs
default = true
