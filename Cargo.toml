[package]
edition = "2021"
name = "firmware_poulpe"
version = "0.1.0"
license = "MIT OR Apache-2.0"
default-run = "firmware_poulpe" # Refers to src/main.rs by default

[features]
### orbita specifig config

###### old
## ec60 based orbita 2d + beta hardware
# default = ["orbita2d", "beta", "ec60", "cmd_filter", "axis_output", "use_flash"]

###### beta
## orbita 2d (genric boards with poulpe + 2x BOB)
# default = ["orbita2d", "beta", "ec45",  "cmd_filter", "gearbox_output" , "use_flash"]
## orbita 3d (genric boards with poulpe + 3x BOB)
# default = ["orbita3d", "beta", "ecx22", ,"cmd_filter","gearbox_output", "use_flash"]
orbita2d_beta = ["orbita2d", "beta", "ec45", "cmd_filter", "gearbox_output" , "use_flash", "allow_quickstop", "ethercat"] #"dynamixel"]
orbita3d_beta = ["orbita3d", "beta", "ecx22", "cmd_filter", "gearbox_output", "use_flash", "allow_quickstop", "orbita3d_zero_pre_dvt", "ethercat"] #"dynamixel"]


####### gamma (dvt)
## orbita 2d (gamma elec)
# default = ["orbita2d", "gamma", "ec45", "cmd_filter", "gearbox_output" , "use_flash"]
## orbita 3d (gamma elec)
# default = ["orbita3d", "gamma", "ecx22",  "cmd_filter", "gearbox_output", "use_flash"]
orbita2d_gamma = ["orbita2d", "gamma", "ec45", "cmd_filter", "gearbox_output" , "use_flash", "allow_quickstop", "ethercat"]
orbita3d_gamma = ["orbita3d", "gamma", "ecx22l", "cmd_filter", "gearbox_output", "use_flash", "allow_quickstop", "ethercat"]

## pvt 
orbita2d_pvt = ["orbita2d", "pvt", "ec45", "cmd_filter", "gearbox_output" , "use_flash", "allow_quickstop", "allow_mode_change", "ethercat"]
orbita3d_pvt = ["orbita3d", "pvt", "ecx22l", "cmd_filter", "gearbox_output", "use_flash", "allow_quickstop", "allow_mode_change", "ethercat"]

# default = ["orbita2d_gamma"]
orbita2d = []
orbita3d = []

# motor type
ec60 = []
ec45=[]
ecx22=[]
ecx22l=[]

# driver board type
beta = [] # beta elec with poulpe + 2/3 X sponge+BOB
gamma = [] # new gamma elec with poulpe + ventouse 2d/3d
pvt = [] # pvt elec with poulpe + ventouse 2d/3d

# use command filter to reduce the jerk of the motor
cmd_filter = []
# using velocity feedforward to improve the velocity tracking performance
# if not included in `defaults` the velocity feedforward is not used
velocity_feedforward = []
# deciding which output angle of the motor to control
# after gearbox, after axis reduction, or directly the motor angle (by not specifying any of the following features in `defaults`)
gearbox_output = []  # control the motor angle after the gearbox
axis_output = []  # control the motor angle after the gearbox and axis reduction

# use flash memory (if not included in `defaults` the flash memory is not used)
use_flash = []
# write the new config to the flash (has to be used with `use_flash`)
# if not used the config is read from the flash
write_flash = []

# feature signaling that the board does not have a temperature sensor
no_temperature_sensor = []
# feature allowing to ignore the errors and continue the operation
# this is a debug feature and should not be used in production
ignore_errors = []
# display the task execution time in the debug console
debug_execution_time = []

# for the computation of the zero position prior to Reachy2 DVT
orbita3d_zero_pre_dvt =[]

# chosing the communication protocol
ethercat = []
dynamixel = []

# allow mode of operation to be changed by the user
allow_mode_change = []
# allow the user to send the quick stop command through ethercat
allow_quickstop = []



