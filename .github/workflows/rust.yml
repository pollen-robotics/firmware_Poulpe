name: Rust

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Build Orbita3d
      run: cargo build --verbose --features=orbita3d_gamma
    - name: Build Orbita2d
      run: cargo build --verbose --features=orbita2d_gamma
    - name: Run tests
      run: cargo test --verbose
